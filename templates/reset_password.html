{% extends "base.html" %}
{% block title %}איפוס סיסמה - OurHome IL{% endblock %}
{% block content %}
<style>
.auth-card{max-width:400px;margin:8% auto;background:white;border-radius:20px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.1);direction:rtl;}
.auth-card h2{text-align:center;font-size:1.3rem;font-weight:700;margin:0 0 8px;color:#1e3a5f;}
.auth-card p{text-align:center;color:#888;font-size:.85rem;margin-bottom:20px;}
.auth-card input{width:100%;padding:12px 15px;border:2px solid #e0e0e0;border-radius:10px;font-size:.95rem;margin-bottom:12px;box-sizing:border-box;}
.auth-card input:focus{outline:none;border-color:#2563eb;}
.auth-card .btn{width:100%;padding:12px;background:linear-gradient(135deg,#1e3a5f,#2563eb);color:white;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;}
</style>
<div class="auth-card">
    <div style="text-align:center;font-size:2.5rem;margin-bottom:10px;">🔑</div>
    <h2>סיסמה חדשה</h2>
    <p>הכנס סיסמה חדשה לחשבון שלך</p>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="password" name="password" placeholder="סיסמה חדשה (לפחות 6 תווים)" required minlength="6">
        <input type="password" name="password2" placeholder="אימות סיסמה" required>
        <button type="submit" class="btn">שנה סיסמה</button>
    </form>
</div>
{% endblock %}
