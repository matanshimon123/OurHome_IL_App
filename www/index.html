<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OurHome IL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#2563eb,#3b82f6);min-height:100vh;display:flex;align-items:center;justify-content:center;color:white}
.wrap{text-align:center;padding:24px}
.spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
h2{font-size:1.4rem;font-weight:700;margin-bottom:8px}
#status{font-size:0.9rem;opacity:0.75;margin-bottom:20px}
#retryBtn{
  display:none;
  background:rgba(255,255,255,0.2);
  border:2px solid rgba(255,255,255,0.6);
  color:white;font-size:0.95rem;font-weight:600;
  padding:10px 28px;border-radius:25px;cursor:pointer;
  margin-top:8px;
}
#retryBtn:active{background:rgba(255,255,255,0.35)}
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner" id="spinner"></div>
  <h2>OurHome IL</h2>
  <p id="status">מתחבר...</p>
  <button id="retryBtn" onclick="retry()">נסה שוב</button>
</div>
<script>
  var attempts = 0;
  var timer;

  function showError() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').textContent = 'לא ניתן להתחבר לשרת. בדוק חיבור אינטרנט.';
    document.getElementById('retryBtn').style.display = 'inline-block';
  }

  function retry() {
    attempts = 0;
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('status').textContent = 'מתחבר...';
    document.getElementById('retryBtn').style.display = 'none';
    startCheck();
  }

  function startCheck() {
    clearTimeout(timer);
    timer = setTimeout(function() {
      attempts++;
      if (attempts >= 3) {
        showError();
      } else {
        document.getElementById('status').textContent = 'מנסה שוב... (' + attempts + '/3)';
        startCheck();
      }
    }, 5000);
  }

  // אם Capacitor מצליח לטעון את השרת – הדף הזה מוחלף אוטומטית
  // אם לא – נציג שגיאה אחרי 15 שניות (3 ניסיונות)
  startCheck();
</script>
</body>
</html>
